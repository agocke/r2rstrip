name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src -c Release

      - name: Test
        run: dotnet test test/r2rstrip.Tests -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/results.trx"

      - name: Pack
        run: dotnet pack src -c Release

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/package/release/*.nupkg
