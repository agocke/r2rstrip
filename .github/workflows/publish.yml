name: Publish to NuGet

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: dotnet test test/r2rstrip.Tests -c Release

      - name: Pack
        run: dotnet pack src -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Login to NuGet
        run: dotnet nuget login https://api.nuget.org/v3/index.json --login-type oidc --audience api://AzureADTokenExchange

      - name: Push to NuGet
        run: dotnet nuget push artifacts/package/release/*.nupkg --source https://api.nuget.org/v3/index.json
